name: Build Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/react_ui/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build bundled UI assets
        shell: pwsh
        run: .\scripts\build_packaged_ui.ps1

      - name: Build package artifacts
        run: uv build

      - name: Verify wheel contains bundled UI
        shell: pwsh
        run: |
          @'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")
          wheel = wheels[-1]
          required = "experiment_control/_ui_dist/index.html"
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          if required not in names:
              raise SystemExit(f"Missing bundled UI asset in wheel: {required}")
          print(f"Verified bundled UI in {wheel.name}")
          '@ | python -

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: experiment-control-dist-${{ github.run_number }}
          path: dist/*
          if-no-files-found: error
