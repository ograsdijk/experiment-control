name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/react_ui/package-lock.json

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        run: uv sync

      - name: Lint Python
        run: uv run ruff check src tests examples

      - name: Complexity guard (incremental)
        run: uv run ruff check src/experiment_control/utils/command_interceptors.py src/experiment_control/utils/network_hosts.py --select C901

      - name: Run Python tests
        run: uv run python -m unittest discover -s tests -p "test_*.py" -q

      - name: Install UI dependencies
        run: npm ci --prefix web/react_ui

      - name: Build React UI
        run: npm run build --prefix web/react_ui

      - name: Build bundled UI assets
        shell: pwsh
        run: .\scripts\build_packaged_ui.ps1

      - name: Build package artifacts
        run: uv build

      - name: Verify wheel contains bundled UI
        shell: pwsh
        run: |
          @'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              raise SystemExit("No wheel found in dist/")
          wheel = wheels[-1]
          required = "experiment_control/_ui_dist/index.html"
          with zipfile.ZipFile(wheel) as zf:
              names = set(zf.namelist())
          if required not in names:
              raise SystemExit(f"Missing bundled UI asset in wheel: {required}")
          print(f"Verified bundled UI in {wheel.name}")
          '@ | python -

  windows_lifecycle_smoke:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        run: uv sync

      - name: Run Windows lifecycle smoke test
        env:
          EC_ENABLE_WINDOWS_LIFECYCLE_SMOKE: "1"
        run: uv run python -m unittest -q tests.test_windows_lifecycle_smoke
