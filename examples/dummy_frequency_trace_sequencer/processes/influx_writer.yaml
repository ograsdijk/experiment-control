version: 1
process_id: influx_writer

process:
  module: experiment_control.processes.influx_writer
  class_name: InfluxWriterProcess

init_kwargs:
  destinations:
    default:
      url: "http://127.0.0.1:8086"
      token: "${INFLUX_TOKEN}"
      org: "centrex"
      bucket: "telemetry"
      measurement: "unknown_device"
      precision: "ns"
      request_timeout_s: 5.0
  default_destination: "default"
  # Optional per-device overrides:
  # routes:
  #   trace1:
  #     destination: "default"
  #     measurement: "dummy_resonance_trace"
  #     device_type: "dummy_resonance_trace"
  #     tags:
  #       location: "bench_a"
  routes: {}
  disabled_devices: []
  enabled: true
  write_batch_size: 500
  write_flush_interval_ms: 1000
  max_queue_points: 100000
  overflow_policy: "drop_oldest"
  include_device_type_tag: true
  include_quality_fields: true
  include_unit_fields: false
  device_type_key: "device_type"
  device_tag_keys: ["location"]

heartbeat_period_s: 1.0
heartbeat_timeout_s: 3.0
shutdown_timeout_s: 3.0
restart_policy: NEVER
