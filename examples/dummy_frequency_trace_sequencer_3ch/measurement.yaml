version: 1

profiles:
  frequency_scan:
    label: Frequency Scan
    description: Dummy frequency sweep for stream-analysis examples.
    fields:
      - key: measurement_name
        label: Measurement Name
        type: string
        required: true
        placeholder: e.g. resonance_scan_001
      - key: transition
        label: Transition
        type: string
        required: true
        options: [R0 F1, R0 F2, R1 F1, R1 F2]
        allow_custom: true
      - key: det_power_mw
        label: DET power mW
        type: number
        required: false

notes:
  fields:
    - key: author
      label: Author
      type: string
      required: true
      options: [alice, bob, charlie]
      allow_custom: true
    - key: kind
      label: Kind
      type: string
      required: true
      options: [note, observation, issue, action]
      default: note
    - key: message
      label: Message
      type: string
      required: true
      multiline: true
      placeholder: Text...
