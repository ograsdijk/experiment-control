version: 1
vars:
steps:
  - for:
      bind: temp_c
      in:
        gen:
          linspace: {start: 10.0, stop: 20.0, num: 11}
      do:
        - set:
            device: dummy1
            name: temperature
            value: ${temp_c}

        - wait_until:
            timeout_s: 0.0
            every_s: 0.2
            sample:
              telemetry: {device: dummy1, signal: temperature, max_age_s: 2.0}
            reduce:
              method: mean
              window_s: 5.0
            condition:
              abs_lt:
                - ${sample_reduced - temp_c}
                - 0.3
            stable_for_s: 2.0

        # Attach context metadata to the next stream chunk
        - set_context:
            streams:
              - {device: trace1, stream: trace}
            fields:
              target_temp_c: ${temp_c}

        # Trigger a stream chunk (written to SHM, announced via manager.chunk_ready)
        - call:
            device: trace1
            action: stream__acquire_trace

        - sleep: 0.2
