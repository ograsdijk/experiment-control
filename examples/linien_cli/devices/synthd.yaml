version: 1

device_id: SynthHD
telemetry_period_s: 1.0

driver:
  module: experiment_control.drivers.synthhd_driver
  class_name: SynthHD

init_kwargs:
  port: COM4

telemetry_calls:
  - method: get_enable_channel_0
    outputs:
      - signal: enable 0
        kind: scalar
        units: ""
        dtype: bool
  - method: get_frequency_channel_0
    outputs:
      - signal: frequency 0
        kind: scalar
        units: "Hz"
        dtype: float64
  - method: get_power_channel_0
    outputs:
      - signal: power 0
        kind: scalar
        units: "dBm"
        dtype: float64
  - method: get_enable_channel_1
    outputs:
      - signal: enable 1
        kind: scalar
        units: ""
        dtype: bool
  - method: get_frequency_channel_1
    outputs:
      - signal: frequency 1
        kind: scalar
        units: "Hz"
        dtype: float64
  - method: get_power_channel_1
    outputs:
      - signal: power 1
        kind: scalar
        units: "dBm"
        dtype: float64